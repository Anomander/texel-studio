services:
  texel-studio:
    build: .
    ports:
      - "8500:8500"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT=${GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT:-}
      - API_KEY=${API_KEY:-}
      - REDIS_URL=redis://redis:6379
    volumes:
      - texel-output:/app/output
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

  worker:
    build: .
    command: python worker.py
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT=${GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT:-}
      - REDIS_URL=redis://redis:6379
    volumes:
      - texel-output:/app/output
    depends_on:
      - redis

volumes:
  texel-output:
  redis-data:
