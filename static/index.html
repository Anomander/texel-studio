<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Studio</title>
<style>
  :root {
    --bg: #0b0a09;
    --surface: #12110f;
    --border: #1a1610;
    --text: #c4bfb4;
    --text-dim: #6a6458;
    --accent: #c8a44e;
    --accent-hover: #d4b35c;
    --danger: #8b2020;
    --success: #4a6741;
    --font-mono: 'Menlo', 'Monaco', 'Courier New', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; font-size: 14px; }
  h1, h2, h3 { font-weight: 500; }

  /* Layout */
  .app { display: grid; grid-template-columns: 280px 1fr 320px; height: 100vh; }
  .panel { border-right: 1px solid var(--border); overflow-y: auto; padding: 16px; }
  .panel:last-child { border-right: none; border-left: 1px solid var(--border); }
  .panel-header { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 12px; font-family: var(--font-mono); }

  /* Center canvas area */
  .canvas-area { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; padding: 24px; position: relative; }
  .canvas-area canvas { image-rendering: pixelated; border: 1px solid var(--border); cursor: crosshair; }

  /* Form elements */
  input, textarea, select, button { font-family: inherit; font-size: 13px; border: 1px solid var(--border); background: var(--surface); color: var(--text); padding: 8px 10px; outline: none; width: 100%; }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 80px; font-family: var(--font-mono); font-size: 12px; }
  select { cursor: pointer; }
  button { cursor: pointer; background: var(--accent); color: var(--bg); font-weight: 600; border: none; text-transform: uppercase; letter-spacing: 0.05em; font-size: 12px; padding: 10px; transition: background 0.15s; }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  button.secondary:hover { border-color: var(--accent); }
  button.danger { background: var(--danger); color: #fff; }

  /* Labels */
  label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  .field { margin-bottom: 12px; }

  /* Palette */
  .palette-grid { display: flex; flex-wrap: wrap; gap: 2px; margin-bottom: 8px; }
  .palette-swatch {
    width: 24px; height: 24px; border: 1px solid var(--border); cursor: pointer; position: relative;
    transition: transform 0.1s;
  }
  .palette-swatch:hover { transform: scale(1.2); z-index: 1; }
  .palette-swatch.selected { outline: 2px solid var(--accent); outline-offset: 1px; }
  .palette-swatch .idx { position: absolute; bottom: 0; right: 1px; font-size: 7px; color: rgba(255,255,255,0.5); font-family: var(--font-mono); }

  /* History list */
  .history-item {
    display: flex; gap: 10px; padding: 8px; border: 1px solid var(--border); margin-bottom: 6px;
    cursor: pointer; transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--accent); }
  .history-item.active { border-color: var(--accent); background: rgba(200,164,78,0.05); }
  .history-item img { width: 40px; height: 40px; image-rendering: pixelated; }
  .history-item .info { flex: 1; min-width: 0; }
  .history-item .prompt { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-item .meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  /* Status */
  .status { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); }
  .status.generating { color: var(--accent); }
  .status.error { color: var(--danger); }
  .status.complete { color: var(--success); }

  /* Logs */
  .log-entry { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); padding: 4px 0; border-bottom: 1px solid var(--border); }
  .log-entry .step { color: var(--accent); }

  /* Toolbar */
  .toolbar { display: flex; gap: 8px; align-items: center; }
  .toolbar .size-display { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); }

  /* Color input row */
  .color-input-row { display: flex; gap: 4px; }
  .color-input-row input[type="color"] { width: 32px; height: 32px; padding: 0; border: 1px solid var(--border); cursor: pointer; }
  .color-input-row input[type="text"] { flex: 1; font-family: var(--font-mono); }

  /* Pixel info */
  .pixel-info { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); height: 16px; }

  /* Reference image */
  .ref-container { margin-top: 8px; }
  .ref-container img { max-width: 100%; border: 1px solid var(--border); margin: 6px 0; image-rendering: auto; }
  .ref-actions { display: flex; gap: 4px; margin-top: 4px; }
  .ref-actions button { flex: 1; }
</style>
</head>
<body>
<div class="app">
  <!-- Left Panel: Palette + Generation -->
  <div class="panel" id="left-panel">
    <div class="panel-header">Palette</div>

    <div class="field">
      <select id="palette-select" onchange="selectPalette(this.value)"></select>
    </div>

    <div class="palette-grid" id="palette-grid"></div>

    <div class="field color-input-row">
      <input type="color" id="add-color-picker" value="#8B5E3C">
      <input type="text" id="add-color-hex" value="#8B5E3C" placeholder="#hex" maxlength="7">
      <button class="secondary" onclick="addColor()" style="width:auto;padding:8px 12px">+</button>
    </div>

    <div class="field" style="display:flex;gap:4px">
      <input type="text" id="palette-name" placeholder="Palette name">
      <button class="secondary" onclick="savePaletteAs()" style="width:auto;padding:8px 12px">Save As</button>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">

    <div class="panel-header">Generate</div>

    <div class="field">
      <label>Prompt</label>
      <textarea id="gen-prompt" placeholder="A dirt block with embedded pebbles and thin root fragments..."></textarea>
    </div>

    <div class="field">
      <label>Type</label>
      <select id="gen-type"></select>
    </div>

    <div class="field" style="display:flex;gap:6px">
      <div style="flex:1">
        <label>Size</label>
        <select id="gen-size">
          <option value="8">8x8</option>
          <option value="16" selected>16x16</option>
          <option value="32">32x32</option>
          <option value="64">64x64</option>
        </select>
      </div>
      <div style="flex:2">
        <label>Model</label>
        <select id="gen-model"></select>
      </div>
    </div>

    <div class="field">
      <label>System Prompt (style guide)</label>
      <textarea id="gen-system" rows="4" style="min-height:60px;font-size:11px"></textarea>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
    <div class="panel-header">Reference Image (optional)</div>
    <div class="field">
      <label>Concept Art Model</label>
      <select id="ref-model"></select>
    </div>
    <button class="secondary" id="ref-gen-btn" onclick="generateReference()">Generate Concept Art</button>
    <div class="ref-container" id="ref-container" style="display:none">
      <img id="ref-img" src="" alt="Reference">
      <div class="ref-actions">
        <button class="secondary" onclick="confirmReference()">Confirm</button>
        <button class="secondary" onclick="reviseReference()">Revise</button>
        <button class="danger" onclick="clearReference()">Clear</button>
      </div>
      <div class="status" id="ref-status"></div>
    </div>

    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
    <div style="display:flex;gap:4px">
      <button id="gen-btn" onclick="generate()" style="flex:1">Generate Sprite</button>
      <button id="skip-btn" class="secondary" onclick="skipAndFinalize()" style="flex:0;width:auto;padding:8px 12px;display:none">Skip</button>
    </div>

    <div class="status" id="gen-status" style="margin-top:8px"></div>
  </div>

  <!-- Center: Canvas -->
  <div class="canvas-area">
    <div class="toolbar">
      <span class="size-display" id="size-display">16x16</span>
      <button class="secondary" onclick="exportSprite()" style="width:auto;padding:6px 12px;font-size:11px">Export PNG</button>
      <button class="secondary" onclick="exportSpriteUpscaled()" style="width:auto;padding:6px 12px;font-size:11px">Export 512px</button>
      <button class="secondary" onclick="showTilesetDialog()" style="width:auto;padding:6px 12px;font-size:11px">Generate Tileset</button>
    </div>
    <canvas id="sprite-canvas" width="512" height="512"></canvas>
    <div class="pixel-info" id="pixel-info"></div>
    <div style="font-size:11px;color:var(--text-dim)">Click to paint with selected palette color. Right-click to erase.</div>

    <!-- Chat edit input — appears after generation -->
    <div id="chat-panel" style="display:none;width:100%;margin-top:12px">
      <div style="display:flex;gap:4px">
        <input type="text" id="chat-input" placeholder="Tell the agent what to change..." style="flex:1"
               onkeydown="if(event.key==='Enter')sendChat()">
        <button class="secondary" onclick="sendChat()" style="width:auto;padding:8px 12px">Send</button>
      </div>
    </div>

    <!-- Tileset preview -->
    <div id="tileset-preview" style="display:none;margin-top:16px;width:100%">
      <div style="font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;font-family:var(--font-mono)">Tileset Preview</div>
      <div id="tileset-grid" style="display:flex;flex-wrap:wrap;gap:2px;"></div>
    </div>
  </div>

  <!-- Right Panel: History + Logs -->
  <div class="panel" id="right-panel">
    <div class="panel-header">History</div>
    <div id="history-list"></div>

    <hr style="border:none;border-top:1px solid var(--border);margin:16px 0">

    <div class="panel-header">Generation Log</div>
    <div id="log-list"></div>
  </div>
</div>

<script>
// ── State ──
let palettes = [];
let currentPalette = null;
let selectedColorIdx = 0;
let generations = [];
let currentGen = null;
let pixelData = null;
let spriteSize = 16;

const canvas = document.getElementById('sprite-canvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ── API ──
async function api(path, opts = {}) {
  const res = await fetch('/api' + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok) throw new Error(`API error: ${res.status}`);
  return res.json();
}

// ── Palette ──
async function loadPalettes() {
  palettes = await api('/palettes');
  const sel = document.getElementById('palette-select');
  sel.innerHTML = palettes.map(p => `<option value="${p.id}">${p.name} (${p.colors.length})</option>`).join('');
  if (palettes.length > 0 && !currentPalette) {
    selectPalette(palettes[0].id);
  }
}

function selectPalette(id) {
  currentPalette = palettes.find(p => p.id == id);
  if (!currentPalette) return;
  selectedColorIdx = 0;
  renderPalette();
}

function renderPalette() {
  if (!currentPalette) return;
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = currentPalette.colors.map((c, i) =>
    `<div class="palette-swatch ${i === selectedColorIdx ? 'selected' : ''}"
          style="background:${c}" onclick="selectColor(${i})"
          title="${i}: ${c}">
      <span class="idx">${i}</span>
    </div>`
  ).join('');
}

function selectColor(idx) {
  selectedColorIdx = idx;
  renderPalette();
}

async function addColor() {
  if (!currentPalette) return;
  const hex = document.getElementById('add-color-hex').value;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  currentPalette.colors.push(hex);
  await api(`/palettes/${currentPalette.id}`, { method: 'PUT', body: { colors: currentPalette.colors } });
  renderPalette();
}

// Sync color picker and text input
document.getElementById('add-color-picker').addEventListener('input', e => {
  document.getElementById('add-color-hex').value = e.target.value;
});
document.getElementById('add-color-hex').addEventListener('input', e => {
  if (/^#[0-9a-fA-F]{6}$/.test(e.target.value)) {
    document.getElementById('add-color-picker').value = e.target.value;
  }
});

async function savePaletteAs() {
  const name = document.getElementById('palette-name').value.trim();
  if (!name || !currentPalette) return;
  const result = await api('/palettes', { method: 'POST', body: { name, colors: currentPalette.colors } });
  await loadPalettes();
  selectPalette(result.id);
}

// ── Generation (SSE stream) ──
let activeAbort = null;
let activeGenId = null;

async function skipAndFinalize() {
  if (activeAbort) activeAbort.abort();
  if (!activeGenId) return;
  try {
    const res = await api(`/generations/${activeGenId}/finalize`, { method: 'POST' });
    document.getElementById('gen-status').className = 'status complete';
    document.getElementById('gen-status').textContent = 'Finalized with current state.';
    currentGen = { id: res.id, image_path: res.image_path };
    await loadHistory();
  } catch (e) {
    // Generation might have already completed
  }
  document.getElementById('skip-btn').style.display = 'none';
  document.getElementById('gen-btn').disabled = false;
  activeAbort = null;
  activeGenId = null;
}

async function generate() {
  if (!currentPalette) return;
  const btn = document.getElementById('gen-btn');
  const status = document.getElementById('gen-status');
  const logList = document.getElementById('log-list');
  const prompt = document.getElementById('gen-prompt').value.trim();
  if (!prompt) return;
  // Reference image is optional

  btn.disabled = true;
  document.getElementById('skip-btn').style.display = 'block';
  logList.innerHTML = '';
  status.className = 'status generating';
  status.textContent = 'Starting...';
  spriteSize = parseInt(document.getElementById('gen-size').value);

  // Clear canvas and hide chat
  pixelData = Array.from({ length: spriteSize }, () => Array(spriteSize).fill(-1));
  renderCanvas();
  document.getElementById('tileset-preview').style.display = 'none';
  document.getElementById('chat-panel').style.display = 'none';
  document.getElementById('size-display').textContent = `${spriteSize}x${spriteSize}`;

  activeAbort = new AbortController();

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      signal: activeAbort.signal,
      body: JSON.stringify({
        prompt,
        palette_id: currentPalette.id,
        size: spriteSize,
        system_prompt: document.getElementById('gen-system').value || null,
        model: document.getElementById('gen-model').value || null,
        reference_id: (refConfirmed && currentRefId) ? currentRefId : null,
        sprite_type: document.getElementById('gen-type').value,
      }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      // Parse SSE events from buffer
      const lines = buffer.split('\n');
      buffer = lines.pop(); // keep incomplete line

      let eventType = '';
      let eventData = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7);
        } else if (line.startsWith('data: ')) {
          eventData = line.slice(6);
        } else if (line === '' && eventType && eventData) {
          handleSSE(eventType, JSON.parse(eventData), status, logList);
          eventType = '';
          eventData = '';
        }
      }
    }

    // Final: refresh history
    await loadHistory();

  } catch (e) {
    if (e.name !== 'AbortError') {
      status.className = 'status error';
      status.textContent = `Error: ${e.message}`;
    }
  }
  btn.disabled = false;
  document.getElementById('skip-btn').style.display = 'none';
  activeAbort = null;
}

function handleSSE(event, data, statusEl, logList) {
  switch (event) {
    case 'log':
      statusEl.className = 'status generating';
      statusEl.textContent = data.message;
      logList.innerHTML += `<div class="log-entry"><span class="step">${data.step}</span> ${data.message}</div>`;
      // Auto-scroll logs
      logList.scrollTop = logList.scrollHeight;
      break;

    case 'pixels':
      pixelData = data.pixel_data;
      if (data.gen_id) activeGenId = data.gen_id;
      renderCanvas();
      statusEl.textContent = `Iteration ${data.iteration}: ${data.notes}`;
      break;

    case 'complete':
      statusEl.className = 'status complete';
      statusEl.textContent = 'Complete! Use chat below to request edits.';
      currentGen = { id: data.id, image_path: data.image_path };
      activeGenId = data.id;
      document.getElementById('skip-btn').style.display = 'none';
      document.getElementById('chat-panel').style.display = 'block';
      // Show tileset button only for block type
      const curType = document.getElementById('gen-type').value;
      const tilesetBtn = document.querySelector('[onclick="showTilesetDialog()"]');
      if (tilesetBtn) tilesetBtn.style.display = (window._spriteTypes?.[curType]?.has_tileset) ? '' : 'none';
      break;

    case 'error':
      statusEl.className = 'status error';
      statusEl.textContent = `Error: ${data.message}`;
      logList.innerHTML += `<div class="log-entry"><span class="step" style="color:var(--danger)">error</span> ${data.message}</div>`;
      break;
  }
}

async function loadGeneration(id) {
  const gen = await api(`/generations/${id}`);
  currentGen = gen;
  pixelData = gen.pixel_data;
  spriteSize = gen.size || 16;
  document.getElementById('size-display').textContent = `${spriteSize}x${spriteSize}`;

  // Load palette for this generation
  if (gen.palette) {
    // Use the generation's palette for rendering
    currentPalette = { ...currentPalette, colors: gen.palette };
    renderPalette();
  }

  renderCanvas();
  renderLogs(gen.logs || []);
}

// ── Canvas rendering ──
function renderCanvas() {
  if (!pixelData || !currentPalette) return;
  const scale = Math.floor(512 / spriteSize);
  canvas.width = spriteSize * scale;
  canvas.height = spriteSize * scale;

  // Checkerboard background for transparency
  for (let y = 0; y < spriteSize; y++) {
    for (let x = 0; x < spriteSize; x++) {
      const light = (x + y) % 2 === 0;
      ctx.fillStyle = light ? '#1a1610' : '#15130f';
      ctx.fillRect(x * scale, y * scale, scale, scale);
    }
  }

  // Draw pixels
  for (let y = 0; y < pixelData.length; y++) {
    for (let x = 0; x < pixelData[y].length; x++) {
      const idx = pixelData[y][x];
      if (idx >= 0 && idx < currentPalette.colors.length) {
        ctx.fillStyle = currentPalette.colors[idx];
        ctx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= spriteSize; i++) {
    ctx.beginPath();
    ctx.moveTo(i * scale, 0);
    ctx.lineTo(i * scale, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * scale);
    ctx.lineTo(canvas.width, i * scale);
    ctx.stroke();
  }
}

// ── Canvas interaction (manual painting) ──
function getPixelFromEvent(e) {
  const rect = canvas.getBoundingClientRect();
  const scale = Math.floor(512 / spriteSize);
  const x = Math.floor((e.clientX - rect.left) / (rect.width / spriteSize));
  const y = Math.floor((e.clientY - rect.top) / (rect.height / spriteSize));
  return { x: Math.min(x, spriteSize - 1), y: Math.min(y, spriteSize - 1) };
}

let painting = false;
canvas.addEventListener('mousedown', e => {
  if (!pixelData) return;
  painting = true;
  const { x, y } = getPixelFromEvent(e);
  const color = e.button === 2 ? -1 : selectedColorIdx;
  pixelData[y][x] = color;
  renderCanvas();
});
canvas.addEventListener('mousemove', e => {
  if (!pixelData) return;
  const { x, y } = getPixelFromEvent(e);
  const idx = pixelData[y]?.[x];
  const colorName = idx >= 0 && currentPalette ? currentPalette.colors[idx] : 'transparent';
  document.getElementById('pixel-info').textContent = `(${x}, ${y}) = ${idx} [${colorName}]`;
  if (painting) {
    const color = e.buttons === 2 ? -1 : selectedColorIdx;
    pixelData[y][x] = color;
    renderCanvas();
  }
});
canvas.addEventListener('mouseup', () => { painting = false; savePixelEdits(); });
canvas.addEventListener('mouseleave', () => { painting = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

async function savePixelEdits() {
  if (!currentGen || !pixelData) return;
  // We don't save every stroke — just keep in memory. Export saves.
}

// ── Export ──
function exportSprite() {
  if (!pixelData || !currentPalette) return;
  const img = document.createElement('canvas');
  img.width = spriteSize;
  img.height = spriteSize;
  const ictx = img.getContext('2d');
  for (let y = 0; y < pixelData.length; y++) {
    for (let x = 0; x < pixelData[y].length; x++) {
      const idx = pixelData[y][x];
      if (idx >= 0 && idx < currentPalette.colors.length) {
        ictx.fillStyle = currentPalette.colors[idx];
        ictx.fillRect(x, y, 1, 1);
      }
    }
  }
  const a = document.createElement('a');
  a.download = `sprite_${spriteSize}x${spriteSize}.png`;
  a.href = img.toDataURL('image/png');
  a.click();
}

function exportSpriteUpscaled() {
  if (!pixelData || !currentPalette) return;
  const target = 512;
  const scale = Math.floor(target / spriteSize);
  const img = document.createElement('canvas');
  img.width = target;
  img.height = target;
  const ictx = img.getContext('2d');
  ictx.imageSmoothingEnabled = false;
  for (let y = 0; y < pixelData.length; y++) {
    for (let x = 0; x < pixelData[y].length; x++) {
      const idx = pixelData[y][x];
      if (idx >= 0 && idx < currentPalette.colors.length) {
        ictx.fillStyle = currentPalette.colors[idx];
        ictx.fillRect(x * scale, y * scale, scale, scale);
      }
    }
  }
  const a = document.createElement('a');
  a.download = `sprite_${spriteSize}x${spriteSize}_upscaled.png`;
  a.href = img.toDataURL('image/png');
  a.click();
}

// ── History ──
async function loadHistory() {
  generations = await api('/generations');
  const list = document.getElementById('history-list');
  list.innerHTML = generations.map(g => `
    <div class="history-item ${currentGen && currentGen.id === g.id ? 'active' : ''}"
         onclick="loadGeneration(${g.id})">
      ${g.image_path ? `<img src="/api/images/${g.image_path.replace('.png','_preview.png').replace('_preview_preview','_preview')}" onerror="this.style.display='none'">` : '<div style="width:40px;height:40px;background:var(--surface)"></div>'}
      <div class="info">
        <div class="prompt">${g.prompt}</div>
        <div class="meta">${g.size}x${g.size} &middot; ${g.model || '?'} &middot; ${g.status} &middot; ${g.iterations || 0} itr</div>
      </div>
      <button class="danger" onclick="event.stopPropagation();deleteGen(${g.id})" style="width:auto;padding:4px 8px;font-size:10px">X</button>
    </div>
  `).join('');
}

// ── Logs ──
function renderLogs(logs) {
  const list = document.getElementById('log-list');
  list.innerHTML = logs.map(l => `
    <div class="log-entry">
      <span class="step">${l.step}</span> ${l.message || ''}
    </div>
  `).join('');
}

// ── Chat (continue agent) ──

async function sendChat() {
  const input = document.getElementById('chat-input');
  const msg = input.value.trim();
  if (!msg || !activeGenId) return;

  input.value = '';
  const status = document.getElementById('gen-status');
  const logList = document.getElementById('log-list');
  status.className = 'status generating';
  status.textContent = 'Agent editing...';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ generation_id: activeGenId, message: msg }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '', eventData = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) eventType = line.slice(7);
        else if (line.startsWith('data: ')) eventData = line.slice(6);
        else if (line === '' && eventType && eventData) {
          handleSSE(eventType, JSON.parse(eventData), status, logList);
          eventType = '';
          eventData = '';
        }
      }
    }
    await loadHistory();
  } catch (e) {
    if (e.name !== 'AbortError') {
      status.className = 'status error';
      status.textContent = `Error: ${e.message}`;
    }
  }
}

// ── Tileset Generation ──

async function showTilesetDialog() {
  if (!currentGen || !pixelData) { alert('Generate a sprite first'); return; }
  const name = prompt('Block name (e.g. "Dirt", "Stone"):');
  if (!name || !name.trim()) return;

  try {
    const res = await api('/tileset', {
      method: 'POST',
      body: { generation_id: currentGen.id, name: name.trim() },
    });

    // Show preview
    const preview = document.getElementById('tileset-preview');
    const grid = document.getElementById('tileset-grid');
    preview.style.display = 'block';
    grid.innerHTML = '';

    for (const file of res.files) {
      const wrapper = document.createElement('div');
      wrapper.style.cssText = 'text-align:center;';
      const img = document.createElement('img');
      img.src = `/api/tileset/${name.trim()}/${file}`;
      img.style.cssText = `width:64px;height:64px;image-rendering:pixelated;border:1px solid var(--border);display:block;`;
      const label = document.createElement('div');
      label.textContent = file.replace('.png','').split('_').pop();
      label.style.cssText = 'font-size:9px;color:var(--text-dim);font-family:var(--font-mono);margin-top:2px;';
      wrapper.appendChild(img);
      wrapper.appendChild(label);
      grid.appendChild(wrapper);
    }

    alert(`Tileset saved to: ${res.path}\n${res.count} variants generated.`);
  } catch (e) {
    alert(`Error: ${e.message}`);
  }
}

// ── Reference Image ──
let currentRefId = null;
let refConfirmed = false;

async function generateReference() {
  const prompt = document.getElementById('gen-prompt').value.trim();
  if (!prompt) { alert('Enter a prompt first'); return; }

  const btn = document.getElementById('ref-gen-btn');
  const container = document.getElementById('ref-container');
  const status = document.getElementById('ref-status');

  btn.disabled = true;
  btn.textContent = 'Generating...';
  status.className = 'status generating';
  status.textContent = 'Generating concept art...';
  container.style.display = 'block';
  refConfirmed = false;

  try {
    const rawRes = await fetch('/api/reference', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, feedback: null, model: document.getElementById('ref-model').value, sprite_type: document.getElementById('gen-type').value }),
    });
    const res = await rawRes.json();
    if (!rawRes.ok || res.error) throw new Error(res.error || `HTTP ${rawRes.status}`);
    currentRefId = res.reference_id;
    document.getElementById('ref-img').src = `/api/reference/${currentRefId}`;
    status.className = 'status complete';
    status.textContent = 'Confirm to use as reference, or revise.';
  } catch (e) {
    status.className = 'status error';
    status.textContent = e.message;
  }
  btn.disabled = false;
  btn.textContent = 'Generate Concept Art';
}

function confirmReference() {
  if (!currentRefId) return;
  refConfirmed = true;
  document.getElementById('ref-status').className = 'status complete';
  document.getElementById('ref-status').textContent = 'Reference confirmed. Will be used for generation.';
}

async function reviseReference() {
  const feedback = prompt('What should change?');
  if (!feedback) return;
  const promptText = document.getElementById('gen-prompt').value.trim();

  const btn = document.getElementById('ref-gen-btn');
  const status = document.getElementById('ref-status');
  btn.disabled = true;
  status.className = 'status generating';
  status.textContent = 'Revising...';

  try {
    const res = await api('/reference', {
      method: 'POST',
      body: { prompt: promptText, feedback, model: document.getElementById('ref-model').value, sprite_type: document.getElementById('gen-type').value },
    });
    if (res.error) throw new Error(res.error);
    currentRefId = res.reference_id;
    refConfirmed = false;
    document.getElementById('ref-img').src = `/api/reference/${currentRefId}`;
    status.className = 'status complete';
    status.textContent = 'Revised. Confirm or revise again.';
  } catch (e) {
    status.className = 'status error';
    status.textContent = `Error: ${e.message}`;
  }
  btn.disabled = false;
}

function clearReference() {
  currentRefId = null;
  refConfirmed = false;
  document.getElementById('ref-container').style.display = 'none';
}

async function deleteGen(id) {
  if (!confirm('Delete this generation?')) return;
  await api(`/generations/${id}`, { method: 'DELETE' });
  if (currentGen && currentGen.id === id) {
    currentGen = null;
    pixelData = Array.from({ length: spriteSize }, () => Array(spriteSize).fill(-1));
    renderCanvas();
    document.getElementById('log-list').innerHTML = '';
  }
  await loadHistory();
}

// ── Init ──
async function init() {
  await loadPalettes();
  await loadHistory();

  // Load settings (system prompt + models)
  const settings = await api('/settings');
  document.getElementById('gen-system').value = settings.system_prompt;

  // Populate model selectors
  const modelSel = document.getElementById('gen-model');
  modelSel.innerHTML = (settings.models || []).map(m =>
    `<option value="${m}" ${m === settings.default_model ? 'selected' : ''}>${m}</option>`
  ).join('');

  const refModelSel = document.getElementById('ref-model');
  refModelSel.innerHTML = (settings.image_models || []).map(m =>
    `<option value="${m}" ${m === settings.default_image_model ? 'selected' : ''}>${m}</option>`
  ).join('');

  // Populate type selector
  const typeSel = document.getElementById('gen-type');
  const types = settings.sprite_types || {};
  typeSel.innerHTML = Object.entries(types).map(([k, v]) =>
    `<option value="${k}">${v.label}</option>`
  ).join('');
  window._spriteTypes = types;

  // Init empty canvas
  spriteSize = 16;
  pixelData = Array.from({ length: 16 }, () => Array(16).fill(-1));
  renderCanvas();
}

init();
</script>
